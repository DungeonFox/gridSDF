<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SDF Grid — Modular Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root{--bg:#0d1117;--fg:#c9d1d9;--muted:#8b949e;--panel:rgba(0,0,0,.55);--accent:#58a6ff}
    body{margin:0;overflow:hidden;background:var(--bg);color:var(--fg);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    #controls{position:absolute;top:10px;left:10px;width:560px;max-height:calc(100vh - 20px);overflow:auto;background:var(--panel);padding:12px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,.25)}
    #controls h2{margin:0 0 8px;font-size:16px;color:var(--accent)}
    #controls .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    #controls label{display:block;margin-bottom:6px;font-size:12px;color:var(--muted)}
    #controls input,#controls select,#controls textarea,#controls .mono{width:100%;box-sizing:border-box;padding:6px 8px;border-radius:6px;border:1px solid #30363d;background:#161b22;color:var(--fg)}
    #controls textarea{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    #controls .btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    #controls button{cursor:pointer;padding:8px 10px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:var(--fg)}
    #controls .kbd{padding:2px 6px;border:1px solid #3b424a;border-radius:4px;background:#0b1220;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:11px}
    .note{font-size:11px;color:var(--muted)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;background:#0b1220}
    canvas{display:block}
  </style>
  
  <script src="three.r157.min.js"></script>
</head>
<body>
  <!-- Stark portal: one panel + canvas -->
  <div id="controls"></div>
  <script type="module">
    import { boot } from './main.js';
    boot(); // builds UI into #controls and starts scene
  </script>
</body>
</html>
